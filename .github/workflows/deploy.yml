name: Redirect to Vercel

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-redirect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Create redirect page
        run: |
          mkdir out
          cat > out/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=https://lingopancar.vercel.app/">
              <link rel="canonical" href="https://lingopancar.vercel.app/">
              <title>LingoPancar</title>
              <script>window.location.replace("https://lingopancar.vercel.app/");</script>
            </head>
            <body>
              <p>Redirecting to <a href="https://lingopancar.vercel.app/">lingopancar.vercel.app</a>…</p>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./out"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
